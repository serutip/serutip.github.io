<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seru’s Vault</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

        :root {
            --bg: #f5f0e6;
            --panel: #fdfaf7;
            --accent: #6b4e31;
            --purple: #8b6f9e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            font-family: 'Inter', sans-serif;
            color: var(--accent);
        }
        .container {
            max-width: 1600px;
            margin: 0 auto;
            background: var(--panel);
            min-height: 100vh;
        }
        header {
            background: linear-gradient(135deg, #8b6f47, #a67c52);
            padding: 3rem 2rem 2rem;
            text-align: center;
            color: #fff8f0;
        }
        h1 { font-size: clamp(3rem, 8vw, 6rem); font-weight: 900; letter-spacing: 8px; }
        header h2 { font-size: 1.3rem; letter-spacing: 4px; margin-top: 0.6rem; }

        .carousel-container {
            position: relative;
            padding: 3rem 2rem;
            background: #f8f3eb;
        }
        .carousel {
            display: flex;
            gap: 2rem;
            overflow: hidden;
        }
        .card {
            min-width: 18%;
            background: white;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(107, 78, 49, 0.15);
            cursor: pointer;
        }
        .card:hover { transform: scale(1.04); }
        .card-img {
            width: 100%;
            height: 340px;
            object-fit: contain;
            background: #fff;
            padding: 20px;
        }
        .card-info {
            padding: 1.2rem;
            text-align: center;
        }
        .card-title {
            font-size: 1.05rem;
            font-weight: 800;
            color: var(--accent);
        }

        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(107, 78, 49, 0.9);
            color: white;
            border: none;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            font-size: 2rem;
            cursor: pointer;
            z-index: 10;
        }
        .nav-btn.left { left: 20px; }
        .nav-btn.right { right: 20px; }

        /* Detail Panel - Made very visible */
        #detailPanel {
            position: fixed;
            top: 0;
            right: -520px;
            width: 520px;
            height: 100vh;
            background: var(--panel);
            border-left: 3px solid var(--accent);
            box-shadow: -30px 0 80px rgba(0,0,0,0.35);
            padding: 3rem 2.5rem;
            transition: right 0.4s ease;
            z-index: 9999;
            overflow-y: auto;
        }
        #detailPanel.open { right: 0; }
        #detailClose {
            position: absolute;
            top: 20px;
            right: 25px;
            font-size: 3rem;
            cursor: pointer;
            color: #777;
        }
        #detailImg {
            width: 100%;
            max-height: 380px;
            object-fit: contain;
            background: #fff;
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 1.8rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>SERU’S VAULT</h1>
            <h2>Collector Crypt • Magic Eden</h2>
        </header>

        <div class="carousel-container">
            <button class="nav-btn left" onclick="prevSlide()">‹</button>
            <div class="carousel" id="carousel"></div>
            <button class="nav-btn right" onclick="nextSlide()">›</button>
        </div>

        <div class="footer" style="text-align:center; padding:1.8rem; background:#ede0d4; color:#6b5747;">
            Wallet: 21beBQJJNCAFYpb1UvgykE5Vgrjjgq1U6cZWVcQ4ea6x • Live Collection
        </div>
    </div>

    <!-- Detail Panel -->
    <div id="detailPanel">
        <span id="detailClose" onclick="closeDetail()">×</span>
        <img id="detailImg" src="" alt="">
        <h3 id="detailTitle"></h3>
        <p><strong>Type / Grade:</strong> <span id="detailGrade"></span></p>
        <p><strong>Insured Value:</strong> <span id="detailInsured"></span></p>
        <p><strong>ALT Value:</strong> <span id="detailAlt"></span></p>
        <p><strong>Suggested Sale (97%):</strong> <span id="detailSale"></span></p>
        <p><strong>NFT Address:</strong> <a id="detailNftLink" href="" target="_blank"></a></p>

        <button onclick="viewCC()" style="width:100%; padding:1.2rem; margin-top:1.5rem; background:#6b4e31; color:white; border:none; border-radius:16px; font-weight:900;">View on Collector Crypt</button>
        <button onclick="viewME()" style="width:100%; padding:1.2rem; margin-top:0.8rem; background:#8b6f9e; color:white; border:none; border-radius:16px; font-weight:900;">View on Magic Eden</button>
    </div>

    <script>
        let allCards = [];
        let currentIndex = 0;

        async function loadData() {
            try {
                const res = await fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent('https://api-mainnet.magiceden.dev/v2/wallets/21beBQJJNCAFYpb1UvgykE5Vgrjjgq1U6cZWVcQ4ea6x/tokens'));
                if (res.ok) {
                    const data = await res.json();
                    processCards(data);
                    return;
                }
            } catch (e) {}
            document.getElementById('carousel').innerHTML = '<p style="text-align:center; padding:120px; color:#a00;">Failed to load live data.<br>Please refresh the page.</p>';
        }

        function processCards(data) {
            let packs = [];
            let graded = [];

            data.forEach(item => {
                if (!item.collection?.includes("collector") && !item.collectionName?.includes("Collector Crypt")) return;

                const card = {
                    title: item.name || "Collector Item",
                    img: item.image,
                    nft: item.mintAddress,
                    grade: item.attributes?.find(a => a.trait_type === "The Grade")?.value || "Pack",
                    insured: item.attributes?.find(a => a.trait_type === "Insured Value")?.value ? 
                             `$${item.attributes.find(a => a.trait_type === "Insured Value").value}` : "—",
                    cert: item.attributes?.find(a => a.trait_type === "Grading ID")?.value || null
                };

                if (item.name?.includes("Pack") || item.collectionName?.includes("Membership Pass")) {
                    packs.push(card);
                } else {
                    graded.push(card);
                }
            });

            packs.sort((a, b) => {
                const numA = parseInt(a.title.match(/#(\d+)/)?.[1] || 999999);
                const numB = parseInt(b.title.match(/#(\d+)/)?.[1] || 999999);
                return numA - numB;
            });

            graded.sort((a, b) => a.title.localeCompare(b.title));

            allCards = [...packs, ...graded];
            renderCarousel();
        }

        function renderCarousel() {
            const container = document.getElementById('carousel');
            container.innerHTML = '';

            for (let i = 0; i < 5; i++) {
                const idx = (currentIndex + i) % allCards.length;
                const card = allCards[idx];
                if (!card) break;

                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `
                    <img class="card-img" src="${card.img}" alt="${card.title}">
                    <div class="card-info">
                        <div class="card-title">${card.title}</div>
                    </div>
                `;
                div.onclick = () => showDetail(card);   // Direct and simple
                container.appendChild(div);
            }
        }

        function nextSlide() {
            currentIndex = (currentIndex + 5) % allCards.length;
            renderCarousel();
        }

        function prevSlide() {
            currentIndex = (currentIndex - 5 + allCards.length) % allCards.length;
            renderCarousel();
        }

        async function showDetail(card) {
            // Immediately show the panel
            document.getElementById('detailImg').src = card.img || '';
            document.getElementById('detailTitle').textContent = card.title;
            document.getElementById('detailGrade').textContent = card.grade;
            document.getElementById('detailInsured').textContent = card.insured;

            const nftLink = document.getElementById('detailNftLink');
            nftLink.textContent = card.nft ? card.nft.slice(0,8) + '...' + card.nft.slice(-8) : 'N/A';
            nftLink.href = card.nft ? `https://solscan.io/token/${card.nft}` : '#';

            // Load ALT value in background
            const altValue = await fetchAltValue(card.cert);
            document.getElementById('detailAlt').textContent = altValue ? `$${altValue.toFixed(2)}` : 'Not available';
            document.getElementById('detailSale').textContent = altValue ? `$${(altValue * 0.97).toFixed(1)}` : 'Not available';

            document.getElementById('detailPanel').classList.add('open');
        }

        async function fetchAltValue(cert) {
            if (!cert) return null;
            try {
                const certRes = await fetch("https://alt-platform-server.production.internal.onlyalt.com/graphql/Cert", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({
                        operationName: "Cert",
                        variables: {certNumber: cert},
                        query: `query Cert($certNumber: String!) { cert(certNumber: $certNumber) { asset { id } gradeNumber gradingCompany } }`
                    })
                });
                const certJson = await certRes.json();
                const assetId = certJson?.data?.cert?.asset?.id;
                const grade = certJson?.data?.cert?.gradeNumber; 
                const gradeForRequest = grade ? grade.split('.')[0] : null;
                gradingCompany = certJson?.data?.cert?.gradingCompany || null;
                if (!assetId) return null;

                const valueRes = await fetch("https://alt-platform-server.production.internal.onlyalt.com/graphql/AssetDetails", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({
                        operationName: "AssetDetails",
                        variables: {id: assetId, tsFilter: {gradeNumber: gradeForRequest, gradingCompany: gradingCompany}},
                        query: "query AssetDetails($id: ID!, $tsFilter: TimeSeriesFilter!) { asset(id: $id) { ...AssetDetails ...AssetActiveListings __typename } } fragment AssetDetails on Asset { ...AssetBase images { ...ImageBase __typename } attributes { cardNumber printRun __typename } predictedPrice(tsFilter: $tsFilter) altValueInfo(tsFilter: $tsFilter) { currentAltValue confidenceData { currentConfidenceMetric currentErrorLowerBound currentErrorUpperBound __typename } __typename } cardPops { ...CardPopBase __typename } __typename } fragment AssetBase on Asset { id name year subject category brand variety attributes { cardNumber printRun __typename } __typename } fragment ImageBase on Image { position url __typename } fragment CardPopBase on CardPop { gradingCompany gradeNumber count __typename } fragment AssetActiveListings on Asset { activeListings { ...PublicListingBase items { ...PublicItemBase ...PublicItemAsset __typename } __typename } __typename } fragment PublicListingBase on PublicListing { id minOfferPrice listPrice state createdAt type expiresAt isEligibleForBidding depositsWaived disallowOffers subtitle description requireIdVerification listingPaymentState { state __typename } ...PublicListingLiveDetails __typename } fragment PublicListingLiveDetails on PublicListing { id __typename } fragment PublicItemBase on PublicItem { id displayNames { ...ItemDisplayNamesBase __typename } images { ...ImageBase __typename } attributes { ...ItemAttributesBase __typename } itemVaultState { ...ItemVaultStateBase __typename } timeSeriesStats { ...PublicTimeSeriesStatsBase __typename } recommendedOfferPrice __typename } fragment ItemDisplayNamesBase on ItemDisplayNames { itemName groupName assetName __typename } fragment ItemAttributesBase on ItemAttributes { gradeNumber gradingCompany serial printRun certNumber autograph centering corners edges surfaces qualifier __typename } fragment ItemVaultStateBase on ItemVaultState { createdAt state underAltCustody __ typename } fragment PublicTimeSeriesStatsBase on TimeSeriesStats { latestValue altValueConfidenceData { currentConfidenceMetric currentErrorUpperBound currentErrorLowerBound __typename } __ typename } fragment PublicItemAsset on PublicItem { asset { ...AssetBase __ typename } __ typename }"
                  
                    })
                });
                const valJson = await valueRes.json();
                return valJson?.data?.asset?.altValueInfo?.currentAltValue ? parseFloat(valJson.data.asset.altValueInfo.currentAltValue) : null;
            } catch (e) { return null; }
        }

        function closeDetail() {
            document.getElementById('detailPanel').classList.remove('open');
            document.getElementById('detailAlt').textContent = '0.00'; 
            // Value should become 0 when closing
        }

        function viewCC() { window.open('https://collectorcrypt.com', '_blank'); }
        function viewME() { window.open('https://magiceden.io', '_blank'); }

        // Start
        loadData();
    </script>
</body>
</html>
