<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aquapolis Collection Tracker</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a3c5e, #0f2a44);
      color: #fff;
      margin: 0;
      padding: 20px;
    }
    h1 { text-align: center; color: #ffcb05; text-shadow: 0 0 10px #3b4cca; }
    .subtitle { text-align: center; color: #a0d8ff; margin-bottom: 20px; }

    .controls {
      max-width: 1400px;
      margin: 0 auto 20px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }
    button, input[type="file"] {
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
    }
    button {
      background: #ffcb05;
      color: #1a3c5e;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover { background: #ffd633; }

    .header-info {
      text-align: center;
      background: rgba(255,255,255,0.1);
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 20px;
      max-width: 1400px;
      margin-left: auto;
      margin-right: auto;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 20px;
      max-width: 1400px;
      margin: 0 auto;
    }
    .card {
      background: rgba(255,255,255,0.1);
      border-radius: 12px;
      overflow: hidden;
      transition: all 0.3s;
      text-align: center;
      position: relative;
      cursor: pointer;
    }
    .card:hover { transform: scale(1.08); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
    .card.owned {
      border: 4px solid #00ff00;
      box-shadow: 0 0 15px #00ff00;
    }
    .card img { width: 100%; height: auto; display: block; }
    .card-info { padding: 10px 8px; font-size: 14px; }
    .card-name { font-weight: bold; color: #ffcb05; }
    .card-id { font-size: 12px; color: #a0d8ff; }
    .owned-badge {
      position: absolute;
      top: 8px; right: 8px;
      background: #00ff00; color: #000;
      font-size: 12px; padding: 2px 8px;
      border-radius: 12px; font-weight: bold;
    }
    .loading { text-align: center; font-size: 18px; margin: 50px 0; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Aquapolis Collection Tracker</h1>
    <p class="subtitle">E-Card Series • Click cards to toggle • Preloads aquapolis_owned.txt if present</p>

    <div class="controls">
      <button onclick="clearCollection()">Clear My Collection</button>
      <button onclick="showImportModal()">Import from List</button>
      <label style="background:#ffcb05;color:#1a3c5e;padding:10px 15px;border-radius:8px;cursor:pointer;">
        Load aquapolis_owned.txt
        <input type="file" id="fileInput" accept=".txt" style="display:none;" onchange="handleFileSelect(event)">
      </label>
    </div>

    <div class="header-info">
      <strong>Total Cards:</strong> <span id="total-cards">0</span> &nbsp;&nbsp;
      <strong>Owned:</strong> <span id="owned-count">0</span> / <span id="total-cards2">0</span>
      (<span id="percentage">0</span>%)
    </div>

    <div id="loading" class="loading">Loading Aquapolis set...</div>
    <div id="grid" class="grid"></div>
  </div>

  <!-- Import Modal -->
  <div id="import-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000; align-items:center; justify-content:center;">
    <div style="background:#1a3c5e; padding:25px; border-radius:12px; max-width:500px; width:90%;">
      <h2 style="margin-top:0; color:#ffcb05;">Import Owned Cards</h2>
      <p>Paste your list (one per line). Supports names, localIds, or full IDs.</p>
      <textarea id="import-text" placeholder="Ampharos&#10;50a&#10;H01&#10;ecard2-1" style="width:100%; height:120px;"></textarea>
      <div style="margin-top:15px; text-align:right;">
        <button onclick="hideImportModal()" style="background:#666; margin-right:10px;">Cancel</button>
        <button onclick="importCollection()">Import</button>
      </div>
    </div>
  </div>

  <script>
    const API_URL = "https://api.tcgdex.net/v2/en/sets/ecard2";
    let allCards = [];
    let owned = new Set();

    const grid = document.getElementById('grid');
    const loading = document.getElementById('loading');

    function saveOwned() {
      localStorage.setItem('aquapolisOwned', JSON.stringify([...owned]));
      updateStats();
    }

    function loadOwnedFromStorage() {
      const saved = localStorage.getItem('aquapolisOwned');
      if (saved) owned = new Set(JSON.parse(saved));
    }

    function updateStats() {
      const total = allCards.length;
      const ownedCount = owned.size;
      const percent = total ? Math.round((ownedCount / total) * 100) : 0;
      document.getElementById('owned-count').textContent = ownedCount;
      document.getElementById('total-cards').textContent = total;
      document.getElementById('total-cards2').textContent = total;
      document.getElementById('percentage').textContent = percent;
    }

    function toggleOwned(cardId) {
      if (owned.has(cardId)) owned.delete(cardId);
      else owned.add(cardId);
      saveOwned();
      renderCards();
    }

    function renderCards() {
      grid.innerHTML = '';
      allCards.forEach(card => {
        const isOwned = owned.has(card.id);
        let imageUrl = card.image ? card.image + "/high.png" 
                      : `https://assets.tcgdex.net/en/ecard/ecard2/${card.localId}/high.png`;

        const cardEl = document.createElement('div');
        cardEl.className = `card ${isOwned ? 'owned' : ''}`;
        cardEl.onclick = () => toggleOwned(card.id);

        cardEl.innerHTML = `
          ${isOwned ? '<div class="owned-badge">✓ OWNED</div>' : ''}
          <img src="${imageUrl}" alt="${card.name}" loading="lazy" onerror="this.src='https://via.placeholder.com/180x250?text=No+Image'">
          <div class="card-info">
            <div class="card-name">${card.name}</div>
            <div class="card-id">${card.localId} • ${card.id}</div>
          </div>
        `;
        grid.appendChild(cardEl);
      });
    }

    function preloadOwnedFromFile() {
      // Try to auto-load aquapolis_owned.txt from same folder
      fetch('aquapolis_owned.txt')
        .then(res => {
          if (!res.ok) throw new Error('File not found');
          return res.text();
        })
        .then(text => {
          processOwnedList(text);
          console.log('Preloaded aquapolis_owned.txt successfully');
        })
        .catch(() => {
          console.log('No aquapolis_owned.txt found in the folder (optional)');
        });
    }

    function processOwnedList(text) {
      const lines = text.split('\n').map(l => l.trim().toLowerCase()).filter(l => l);
      let matched = 0;

      allCards.forEach(card => {
        const nameLower = card.name.toLowerCase();
        const idLower = card.id.toLowerCase();
        const localLower = card.localId.toLowerCase();

        if (lines.some(line => 
          nameLower.includes(line) || idLower === line || localLower === line || idLower.includes(line)
        )) {
          owned.add(card.id);
          matched++;
        }
      });

      if (matched > 0) {
        saveOwned();
        renderCards();
        console.log(`Preloaded ${matched} owned cards from file`);
      }
    }

    async function fetchCards() {
      try {
        const res = await fetch(API_URL);
        const data = await res.json();
        allCards = data.cards;

        loadOwnedFromStorage();
        renderCards();
        updateStats();
        loading.style.display = 'none';

        // Try to preload local file AFTER cards are loaded
        preloadOwnedFromFile();

      } catch (err) {
        loading.textContent = "Failed to load cards.";
        console.error(err);
      }
    }

    // Manual file upload
    function handleFileSelect(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        processOwnedList(e.target.result);
        alert(`Loaded ${file.name} and marked matching cards as owned!`);
      };
      reader.readAsText(file);
    }

    function showImportModal() {
      document.getElementById('import-modal').style.display = 'flex';
    }

    function hideImportModal() {
      document.getElementById('import-modal').style.display = 'none';
    }

    function importCollection() {
      const text = document.getElementById('import-text').value.trim();
      if (!text) return hideImportModal();
      processOwnedList(text);
      hideImportModal();
      alert('Import completed!');
    }

    function clearCollection() {
      if (confirm("Clear entire collection?")) {
        owned.clear();
        saveOwned();
        renderCards();
      }
    }

    // Start everything
    window.onload = fetchCards;
  </script>
</body>
</html>
