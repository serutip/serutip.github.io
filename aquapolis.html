<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aquapolis Collection Tracker</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a3c5e, #0f2a44);
      color: #fff;
      margin: 0;
      padding: 15px 10px;
      line-height: 1.4;
    }
    h1 {
      text-align: center;
      color: #ffcb05;
      text-shadow: 0 0 10px #3b4cca;
      font-size: 1.8rem;
      margin: 10px 0 5px;
    }
    .subtitle {
      text-align: center;
      color: #a0d8ff;
      margin-bottom: 20px;
      font-size: 1rem;
    }

    .controls {
      max-width: 1400px;
      margin: 0 auto 20px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }
    button, label {
      padding: 12px 16px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      background: #ffcb05;
      color: #1a3c5e;
    }
    button:hover, label:hover { background: #ffd633; }

    .header-info {
      text-align: center;
      background: rgba(255,255,255,0.1);
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 25px;
      max-width: 1400px;
      margin-left: auto;
      margin-right: auto;
      font-size: 1.05rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(165px, 1fr));
      gap: 18px;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* Mobile-first responsive grid */
    @media (max-width: 480px) {
      .grid {
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 15px;
      }
      h1 { font-size: 1.6rem; }
    }
    @media (min-width: 600px) {
      .grid {
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      }
    }
    @media (min-width: 900px) {
      .grid {
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      }
    }

    .card {
      background: rgba(255,255,255,0.1);
      border-radius: 14px;
      overflow: hidden;
      transition: all 0.3s ease;
      text-align: center;
      position: relative;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }
    .card:hover, .card:active {
      transform: scale(1.06);
      box-shadow: 0 10px 20px rgba(0,0,0,0.5);
    }
    .card.owned {
      border: 5px solid #00ff88;
      box-shadow: 0 0 18px #00ff88;
    }
    .card img {
      width: 100%;
      height: auto;
      display: block;
    }
    .card-info {
      padding: 12px 10px;
      font-size: 14.5px;
    }
    .card-name {
      font-weight: bold;
      color: #ffcb05;
      margin-bottom: 4px;
    }
    .card-id {
      font-size: 12.5px;
      color: #a0d8ff;
    }
    .owned-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      background: #00ff88;
      color: #000;
      font-size: 13px;
      padding: 3px 10px;
      border-radius: 20px;
      font-weight: bold;
      box-shadow: 0 2px 6px rgba(0,0,0,0.4);
    }
    .loading {
      text-align: center;
      font-size: 18px;
      margin: 60px 0;
      padding: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Aquapolis</h1>
    <p class="subtitle">Collection Tracker • Tap cards to mark owned</p>

    <div class="controls">
      <button onclick="clearCollection()">Clear Collection</button>
      <button onclick="showImportModal()">Import List</button>
      <label>
        Load .txt File
        <input type="file" id="fileInput" accept=".txt" style="display:none;" onchange="handleFileSelect(event)">
      </label>
    </div>

    <div class="header-info">
      <strong>Total:</strong> <span id="total-cards">0</span> &nbsp;&nbsp;
      <strong>Owned:</strong> <span id="owned-count">0</span> 
      (<span id="percentage">0</span>%)
    </div>

    <div id="loading" class="loading">Loading Aquapolis cards...</div>
    <div id="grid" class="grid"></div>
  </div>

  <!-- Import Modal -->
  <div id="import-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.92); z-index:1000; align-items:center; justify-content:center;">
    <div style="background:#1a3c5e; padding:25px; border-radius:14px; max-width:480px; width:92%; max-height:85vh; overflow-y:auto;">
      <h2 style="margin-top:0; color:#ffcb05;">Import Owned Cards</h2>
      <p style="margin-bottom:10px;">Paste one card per line (name, localId like 50a, or H01):</p>
      <textarea id="import-text" placeholder="Ampharos&#10;Arcanine&#10;50a&#10;H01&#10;Tyranitar" style="width:100%; height:160px; font-size:15px;"></textarea>
      <div style="margin-top:20px; text-align:right;">
        <button onclick="hideImportModal()" style="background:#666; margin-right:10px; padding:10px 18px;">Cancel</button>
        <button onclick="importCollection()" style="padding:10px 18px;">Import</button>
      </div>
    </div>
  </div>

  <script>
    const API_URL = "https://api.tcgdex.net/v2/en/sets/ecard2";
    let allCards = [];
    let owned = new Set();

    const grid = document.getElementById('grid');
    const loading = document.getElementById('loading');

    function saveOwned() {
      localStorage.setItem('aquapolisOwned', JSON.stringify([...owned]));
      updateStats();
    }

    function loadOwnedFromStorage() {
      const saved = localStorage.getItem('aquapolisOwned');
      if (saved) owned = new Set(JSON.parse(saved));
    }

    function updateStats() {
      const total = allCards.length;
      const ownedCount = owned.size;
      const percent = total ? Math.round((ownedCount / total) * 100) : 0;
      document.getElementById('owned-count').textContent = ownedCount;
      document.getElementById('total-cards').textContent = total;
      document.getElementById('percentage').textContent = percent;
    }

    function toggleOwned(cardId) {
      if (owned.has(cardId)) owned.delete(cardId);
      else owned.add(cardId);
      saveOwned();
      renderCards();
    }

    function renderCards() {
      grid.innerHTML = '';
      allCards.forEach(card => {
        const isOwned = owned.has(card.id);
        let imageUrl = card.image ? card.image + "/high.png" 
                      : `https://assets.tcgdex.net/en/ecard/ecard2/${card.localId}/high.png`;

        const cardEl = document.createElement('div');
        cardEl.className = `card ${isOwned ? 'owned' : ''}`;
        cardEl.onclick = () => toggleOwned(card.id);

        cardEl.innerHTML = `
          ${isOwned ? '<div class="owned-badge">✓ OWNED</div>' : ''}
          <img src="${imageUrl}" alt="${card.name}" loading="lazy" onerror="this.src='https://via.placeholder.com/180x250?text=No+Image'">
          <div class="card-info">
            <div class="card-name">${card.name}</div>
            <div class="card-id">${card.localId} • ${card.id}</div>
          </div>
        `;
        grid.appendChild(cardEl);
      });
    }

    function preloadOwnedFromFile() {
      fetch('aquapolis_owned.txt')
        .then(res => res.ok ? res.text() : Promise.reject())
        .then(text => {
          processOwnedList(text);
          console.log('Preloaded aquapolis_owned.txt');
        })
        .catch(() => console.log('No aquapolis_owned.txt found'));
    }

    function processOwnedList(text) {
      const lines = text.split('\n').map(l => l.trim().toLowerCase()).filter(Boolean);
      let matched = 0;

      allCards.forEach(card => {
        const nameLower = card.name.toLowerCase();
        const idLower = card.id.toLowerCase();
        const localLower = card.localId.toLowerCase();

        if (lines.some(line => 
          nameLower.includes(line) || 
          idLower === line || 
          localLower === line
        )) {
          owned.add(card.id);
          matched++;
        }
      });

      if (matched > 0) {
        saveOwned();
        renderCards();
      }
    }

    async function fetchCards() {
      try {
        const res = await fetch(API_URL);
        const data = await res.json();
        allCards = data.cards;

        loadOwnedFromStorage();
        renderCards();
        updateStats();
        loading.style.display = 'none';

        preloadOwnedFromFile();
      } catch (err) {
        loading.textContent = "Failed to load cards. Check your connection.";
      }
    }

    function handleFileSelect(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        processOwnedList(e.target.result);
        alert(`Loaded ${file.name}`);
      };
      reader.readAsText(file);
    }

    function showImportModal() {
      document.getElementById('import-modal').style.display = 'flex';
      document.getElementById('import-text').focus();
    }

    function hideImportModal() {
      document.getElementById('import-modal').style.display = 'none';
    }

    function importCollection() {
      const text = document.getElementById('import-text').value.trim();
      if (text) processOwnedList(text);
      hideImportModal();
    }

    function clearCollection() {
      if (confirm("Clear your entire collection?")) {
        owned.clear();
        saveOwned();
        renderCards();
      }
    }

    window.onload = fetchCards;
  </script>
</body>
</html>
