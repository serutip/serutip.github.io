        function shortenAddress(address) {
            return address ? address.slice(0, 6) + '...' + address.slice(-4) : '';
        }

        // Direct API call (no proxy)
    async function fetchPoints(walletAddress) {
    // ←←← CHANGE THIS TO YOUR WORKER URL ←←←
    const workerUrl = "https://cc-proxy.wkfepf1120.workers.dev/";

    const url = `${workerUrl}/?wallet=${walletAddress}`;

    try {
        const response = await fetch(url, {
            cache: 'no-store'
        });

        if (!response.ok) {
            console.error(`Worker error: ${response.status}`);
            return null;
        }

        return await response.json();

    } catch (error) {
        console.error(`Fetch error for ${walletAddress}:`, error);
        return null;
    }
}

        function createWalletCard(wallet) {
            return `
                <div class="wallet-card bg-zinc-900 border border-zinc-800 rounded-2xl p-4">
                    <div class="mb-3">
                        <div class="font-medium">${wallet.name}</div>
                        <div class="text-xs font-mono text-zinc-400 mt-0.5">
                            ${shortenAddress(wallet.address)}
                        </div>
                    </div>
                    <div>
                        <div class="text-[10px] text-zinc-400 tracking-wider">POINTS REMAINING</div>
                        <div id="points-${wallet.id}" class="points-value text-3xl font-semibold text-emerald-400 tabular-nums mt-0.5">
                            ---
                        </div>
                    </div>
                </div>
            `;
        }

        function renderGroups() {
            const container = document.getElementById('groups-container');
            container.innerHTML = '';
            container.classList.remove('hidden');

            walletGroups.forEach(group => {
                const groupHTML = `
                    <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-5">
                        <div class="flex items-center gap-x-2 mb-4 px-1">
                            <div class="w-2.5 h-2.5 bg-emerald-400 rounded-full"></div>
                            <h3 class="font-semibold text-lg">${group.name}</h3>
                            <span class="text-xs text-zinc-500">(${group.wallets.length})</span>
                        </div>
                        <div class="grid grid-cols-1 gap-3">
                            ${group.wallets.map(wallet => createWalletCard(wallet)).join('')}
                        </div>
                    </div>
                `;
                container.innerHTML += groupHTML;
            });
        }

        async function checkPredefinedWallet(walletId) {
            let wallet = null;
            for (const group of walletGroups) {
                wallet = group.wallets.find(w => w.id === walletId);
                if (wallet) break;
            }
            if (!wallet) return;

            const pointsEl = document.getElementById(`points-${walletId}`);
            if (!pointsEl) return;

            pointsEl.innerHTML = `<i class="fa-solid fa-spinner fa-spin text-emerald-400"></i>`;

            const data = await fetchPoints(wallet.address);

            if (data && data.pointsRemaining !== undefined) {
                pointsEl.textContent = data.pointsRemaining.toLocaleString();
                pointsEl.classList.remove('text-red-400');
            } else {
                pointsEl.textContent = 'Error';
                pointsEl.classList.add('text-red-400');
            }
        }

        async function checkSpecificGroup(groupId) {
            const container = document.getElementById('groups-container');
            if (container.classList.contains('hidden')) {
                renderGroups();
            }

            const group = walletGroups.find(g => g.id === groupId);
            if (!group) return;

            for (const wallet of group.wallets) {
                await checkPredefinedWallet(wallet.id);
                await new Promise(resolve => setTimeout(resolve, 500));
            }
        }

        async function loadAndCheckAllWallets() {
            const button = document.getElementById('check-all-btn');
            renderGroups();

            const originalText = button.innerHTML;
            button.disabled = true;
            button.innerHTML = `<i class="fa-solid fa-spinner fa-spin mr-2"></i> Checking...`;

            let total = 0;
            walletGroups.forEach(g => total += g.wallets.length);
            let checked = 0;

            for (const group of walletGroups) {
                for (const wallet of group.wallets) {
                    await checkPredefinedWallet(wallet.id);
                    checked++;
                    button.innerHTML = `<i class="fa-solid fa-spinner fa-spin mr-2"></i> Checking... (${checked}/${total})`;
                    await new Promise(resolve => setTimeout(resolve, 500));
                }
            }

            button.disabled = false;
            button.innerHTML = originalText;
        }

        async function checkCustomWallet() {
            const input = document.getElementById('custom-wallet-input');
            const resultDiv = document.getElementById('custom-result');
            const address = input.value.trim();

            if (!address) return alert('Please enter a wallet address');

            resultDiv.classList.remove('hidden');
            resultDiv.innerHTML = `
                <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-6 flex justify-center">
                    <div class="flex items-center gap-x-3 text-zinc-400">
                        <i class="fa-solid fa-spinner fa-spin"></i>
                        <span>Fetching points...</span>
                    </div>
                </div>
            `;

            const data = await fetchPoints(address);

            if (data && data.pointsRemaining !== undefined) {
                resultDiv.innerHTML = `
                    <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-6">
                        <div class="mb-4">
                            <div class="text-xs text-zinc-400">Wallet Address</div>
                            <div class="font-mono text-sm text-emerald-400 break-all">${address}</div>
                        </div>
                        <div>
                            <div class="text-xs text-zinc-400">POINTS REMAINING</div>
                            <div class="text-6xl font-semibold text-emerald-400 tabular-nums">
                                ${data.pointsRemaining.toLocaleString()}
                            </div>
                        </div>
                    </div>
                `;
            } else {
                resultDiv.innerHTML = `
                    <div class="bg-red-950/60 border border-red-900 rounded-2xl p-5 text-center">
                        <p class="text-red-400">Failed to fetch data.</p>
                    </div>
                `;
            }
        }

        function initializeApp() {
            const input = document.getElementById('custom-wallet-input');
            input.addEventListener('keypress', e => {
                if (e.key === 'Enter') checkCustomWallet();
            });
        }

        window.onload = initializeApp;
    </script>
